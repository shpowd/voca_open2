<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(145deg, #0a0e1a 0%, #1a1f35 50%, #0d1117 100%);
    min-height: 100vh;
    color: #e8eaf6;
  }
  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    backdrop-filter: blur(20px);
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; text-align: center; }
  .subtitle { color: #7986cb; font-size: 13px; text-align: center; margin-top: 8px; }
  .emoji-big { font-size: 42px; text-align: center; margin-bottom: 8px; }
  .label { color: #9fa8da; font-size: 13px; font-weight: 600; margin-bottom: 10px; }

  /* Slide toggle (모드 선택) */
  .seg {
    position: relative; display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 4px;
    margin-bottom: 20px;
    user-select: none;
  }
  .seg-indicator {
    position: absolute; top: 4px; left: 4px;
    width: calc(50% - 4px); height: calc(100% - 8px);
    border-radius: 9px;
    background: linear-gradient(135deg, #5c6bc0, #3949ab);
    box-shadow: 0 2px 12px rgba(92,107,192,0.35);
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .seg.pos-1 .seg-indicator { transform: translateX(100%); }
  .seg-btn {
    flex: 1; position: relative; z-index: 1;
    padding: 11px 0; border: none; background: transparent;
    color: #616a8a; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center;
    transition: color 0.25s;
  }
  .seg-btn.active { color: #fff; }

  /* Mode toggle (출제 방향 등) */
  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-btn {
    flex: 1; padding: 12px 0; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: #616a8a; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .mode-btn.active {
    border: 2px solid #5c6bc0;
    background: rgba(92,107,192,0.15);
    color: #9fa8da;
  }

  /* Topic buttons */
  .topic-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .topic-btn {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #9fa8da; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-align: left;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topic-btn:hover { background: rgba(92,107,192,0.08); border-color: rgba(92,107,192,0.3); }
  .topic-btn.active {
    border: 2px solid #5c6bc0;
    background: rgba(92,107,192,0.15);
    color: #e8eaf6;
  }
  .topic-btn .count { color: #5c6bc0; font-size: 12px; }

  /* Count buttons — 2행 3열 그리드 */
  .count-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 24px;
  }
  .count-btn {
    padding: 11px 0; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: #616a8a; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .count-btn.active {
    border: 2px solid #5c6bc0;
    background: rgba(92,107,192,0.15);
    color: #9fa8da;
  }
  .count-btn.disabled {
    opacity: 0.25; pointer-events: none;
  }

  .start-btn {
    width: 100%; padding: 14px 0; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #5c6bc0, #3949ab);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(92,107,192,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(92,107,192,0.4); }
  .start-btn.disabled { opacity: 0.35; pointer-events: none; }

  /* Progress */
  .progress-bar-bg { width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); }
  .progress-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #5c6bc0, #7986cb); transition: width 0.4s ease; }
  .progress-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
  .progress-row .qnum { color: #7986cb; }
  .progress-row .score { color: #66bb6a; }
  .topic-tag { color: #5c6bc0; font-size: 11px; font-weight: 600; margin-top: 4px; }

  /* Definition card */
  .card-quiz { padding: 28px 24px; border-radius: 16px; margin-bottom: 20px; }
  .def-label { color: #5c6bc0; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .def-text { color: #e8eaf6; font-size: 20px; line-height: 1.65; font-weight: 500; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .opt-btn {
    width: 100%; padding: 16px 20px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #c5cae9; font-size: 16px; font-weight: 600;
    text-align: left; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .opt-btn:hover:not(.locked) { background: rgba(92,107,192,0.08); border-color: rgba(92,107,192,0.3); }
  .opt-btn.locked { cursor: default; }
  .opt-btn.correct { background: rgba(76,175,80,0.12); border: 1.5px solid rgba(76,175,80,0.4); color: #66bb6a; }
  .opt-btn.wrong { background: rgba(244,67,54,0.1); border: 1.5px solid rgba(244,67,54,0.35); color: #ef5350; }
  .opt-btn.dimmed { color: #4a5070; }
  .opt-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    background: rgba(255,255,255,0.05); color: #7986cb;
  }
  .opt-btn.correct .opt-icon { background: rgba(76,175,80,0.2); color: #66bb6a; }
  .opt-btn.wrong .opt-icon { background: rgba(244,67,54,0.2); color: #ef5350; }
  .opt-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .opt-main { line-height: 1.4; }
  .opt-sub {
    font-size: 12.5px; font-weight: 500; line-height: 1.45;
    color: #7986cb;
  }
  .opt-btn.correct .opt-sub { color: rgba(102,187,106,0.85); }
  .opt-btn.wrong .opt-sub { color: rgba(239,83,80,0.8); }
  .opt-btn.dimmed .opt-sub { color: #3d4360; }

  .feedback { padding: 10px 20px; border-radius: 10px; margin-top: 16px; font-size: 15px; font-weight: 700; text-align: center; }
  .feedback.ok { background: rgba(76,175,80,0.08); color: #66bb6a; }
  .feedback.no { background: rgba(244,67,54,0.08); color: #ef5350; }
  .next-btn {
    margin-top: 12px; padding: 12px 48px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #5c6bc0, #3949ab);
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 16px rgba(92,107,192,0.3);
  }
  .yarn-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 12px; padding: 12px 20px; border-radius: 10px;
    border: 1px solid rgba(255,183,77,0.3);
    background: rgba(255,183,77,0.08);
    color: #ffb74d; font-size: 14px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s;
  }
  .yarn-btn:hover { background: rgba(255,183,77,0.15); border-color: rgba(255,183,77,0.5); }
  .after-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* Result */
  .score-box { display: inline-block; margin-top: 16px; padding: 12px 32px; border-radius: 14px; }
  .score-box.good { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.25); }
  .score-box.mid { background: rgba(255,183,77,0.12); border: 1px solid rgba(255,183,77,0.25); }
  .score-box.bad { background: rgba(244,67,54,0.12); border: 1px solid rgba(244,67,54,0.25); }
  .score-num { font-size: 36px; font-weight: 800; }
  .score-num.good { color: #66bb6a; }
  .score-num.mid { color: #ffb74d; }
  .score-num.bad { color: #ef5350; }
  .score-pct { color: #7986cb; font-size: 16px; margin-left: 12px; }

  .wrong-title { color: #ef5350; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .wrong-list { max-height: 320px; overflow-y: auto; padding-right: 4px; }
  .wrong-item {
    background: rgba(244,67,54,0.06); border: 1px solid rgba(244,67,54,0.12);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  }
  .wrong-item .word { color: #e8eaf6; font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .wrong-item .def { color: #9fa8da; font-size: 12px; line-height: 1.5; }
  .wrong-item .ans { color: #ef5350; font-size: 11px; margin-top: 6px; }

  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn-row button { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-menu { border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #9fa8da; }
  .btn-retry { border: none; background: linear-gradient(135deg, #5c6bc0, #3949ab); color: #fff; }
  .btn-wrong-only { border: none; background: linear-gradient(135deg, #ef5350, #c62828); color: #fff; }

  .section-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); margin: 16px 0; }

  /* Quiz navigation (이전 / 홈) */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .nav-btn {
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #9fa8da; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { background: rgba(92,107,192,0.1); border-color: rgba(92,107,192,0.35); }
  .nav-btn.disabled { opacity: 0.25; pointer-events: none; }
</style>

const ALL_WORDS = TOPICS.flatMap(t =>
  t.words.map(w => ({ ...w, topic: t.label, topicId: t.id, cat: t.cat }))
);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = {
  mode: "menu",
  quizMode: "all",       // all | topic
  direction: "forward",  // forward(뜻→영어) | reverse(영어→뜻) | mix
  selectedTopic: null,
  totalQ: 20,
  questions: [],         // 각 문제에 answered(선택한 보기 index) 저장 → 이전 문제 이동 가능
  currentQ: 0,
  score: 0,
  wrongList: [],
};

// ── 오답 보기 뽑기: 같은 챕터 위주 + 일부 다른 챕터 섞기 ──
// 확률: 50% → 같은 챕터 2 + 다른 챕터 1
//       30% → 같은 챕터 3
//       20% → 같은 챕터 1 + 다른 챕터 2
function pickDistractors(correct) {
  const notSame = w => w.word !== correct.word && w.def !== correct.def;

  const samePool  = shuffle(ALL_WORDS.filter(w => w.topicId === correct.topicId && notSame(w)));
  // 다른 챕터는 같은 카테고리(ee↔ee, biz↔biz) 우선
  const otherCat  = shuffle(ALL_WORDS.filter(w => w.topicId !== correct.topicId && w.cat === correct.cat && notSame(w)));
  const otherAny  = shuffle(ALL_WORDS.filter(w => w.topicId !== correct.topicId && notSame(w)));

  const r = Math.random();
  let nSame = r < 0.5 ? 2 : (r < 0.8 ? 3 : 1);
  nSame = Math.min(nSame, samePool.length);

  const picks = [];
  const usedWords = new Set([correct.word]);
  const usedDefs  = new Set([correct.def]);

  const tryAdd = (w) => {
    if (picks.length >= 3) return;
    if (usedWords.has(w.word) || usedDefs.has(w.def)) return;
    picks.push(w);
    usedWords.add(w.word);
    usedDefs.add(w.def);
  };

  samePool.slice(0, nSame).forEach(tryAdd);
  otherCat.forEach(tryAdd);
  otherAny.forEach(tryAdd); // 그래도 모자라면 전체에서 보충

  return picks.slice(0, 3);
}

function buildQuestions(wordPool, count, direction) {
  const selected = shuffle(wordPool).slice(0, count);
  return selected.map(correct => {
    const others = pickDistractors(correct);
    const dir = direction === "mix"
      ? (Math.random() < 0.5 ? "forward" : "reverse")
      : direction;
    return { correct, options: shuffle([correct, ...others]), dir, answered: null };
  });
}

function startQuiz() {
  let pool, count;
  if (state.quizMode === "all") {
    pool = ALL_WORDS;
    count = Math.min(state.totalQ, ALL_WORDS.length);
  } else {
    const topic = TOPICS.find(t => t.id === state.selectedTopic);
    if (!topic) return;
    pool = ALL_WORDS.filter(w => w.topicId === topic.id);
    count = pool.length;
  }
  state.questions = buildQuestions(pool, count, state.direction);
  state.currentQ = 0;
  state.score = 0;
  state.wrongList = [];
  state.mode = "quiz";
  render();
}

function selectOption(idx) {
  const q = state.questions[state.currentQ];
  if (q.answered !== null) return; // 이미 푼 문제는 재선택 불가
  q.answered = idx;
  const chosen = q.options[idx];
  const isCorrect = chosen.word === q.correct.word && chosen.def === q.correct.def;
  if (isCorrect) {
    state.score++;
  } else {
    const yourAnswer = q.dir === "forward" ? chosen.word : chosen.def;
    state.wrongList.push({ ...q.correct, yourAnswer });
  }
  render();
}

function nextQuestion() {
  if (state.currentQ + 1 >= state.questions.length) {
    state.mode = "result";
  } else {
    state.currentQ++;
  }
  render();
}

function prevQuestion() {
  if (state.currentQ > 0) {
    state.currentQ--;
    render();
  }
}

function goHome() {
  state.mode = "menu";
  render();
}

// ── getyarn.io 검색 URL 생성 ──
// 비즈니스 표현의 ~, (= ...), (비격식) 같은 표기 제거 후 검색
function yarnUrl(word) {
  const cleaned = word
    .replace(/\([^)]*\)/g, ' ')   // 괄호 내용 제거
    .replace(/~ing/g, ' ')        // ~ing 제거
    .replace(/[~…]/g, ' ')        // 물결표 제거
    .replace(/\s+/g, ' ')         // 공백 정리
    .trim()
    .replace(/[.,]$/, '');        // 끝 문장부호 제거
  return 'https://getyarn.io/yarn-find?text=' + encodeURIComponent(cleaned);
}

function render() {
  const app = document.getElementById("app");
  if (state.mode === "menu") renderMenu(app);
  else if (state.mode === "quiz") renderQuiz(app);
  else renderResult(app);
}

  const dirs = [

function renderQuiz(app) {
  const q = state.questions[state.currentQ];
  const letters = ['A', 'B', 'C', 'D'];
  const isFwd = q.dir === "forward";
  const chosen = q.answered !== null ? q.options[q.answered] : null;
  const isCorrect = chosen && chosen.word === q.correct.word && chosen.def === q.correct.def;
  const answeredCount = state.questions.filter(x => x.answered !== null).length;
  const progress = (answeredCount / state.questions.length) * 100;

  // 문제 카드: forward = 뜻 제시, reverse = 영어 제시
  const promptLabel = isFwd ? "뜻 (Meaning)" : "영어 (English)";
  const promptText  = isFwd ? q.correct.def : q.correct.word;

  let optionsHTML = q.options.map((opt, i) => {
    const isThis   = q.answered === i;
    const isAnswer = opt.word === q.correct.word && opt.def === q.correct.def;
    let cls = "opt-btn";
    let icon = letters[i];
    if (q.answered !== null) {
      cls += " locked";
      if (isAnswer)    { cls += " correct"; icon = "✓"; }
      else if (isThis) { cls += " wrong";   icon = "✗"; }
      else             { cls += " dimmed"; }
    }
    const mainText = isFwd ? opt.word : opt.def;
    const subText  = isFwd ? opt.def  : opt.word;
    // 선택(잠금) 후에만 모든 보기의 뜻/단어를 함께 표시
    const subHTML = q.answered !== null
      ? `<span class="opt-sub">${subText}</span>`
      : '';
    return `<button class="${cls}" onclick="selectOption(${i})">
      <span class="opt-icon">${icon}</span>
      <span class="opt-body">
        <span class="opt-main">${mainText}</span>
        ${subHTML}
      </span>
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (q.answered !== null) {
    const answerText = isFwd ? q.correct.word : q.correct.def;
    feedbackHTML = `
      <div class="feedback ${isCorrect ? 'ok' : 'no'}">
        ${isCorrect ? 'Correct! 🎯' : `Wrong — Answer: ${answerText}`}
      </div>
      <div class="after-row">
        <a class="yarn-btn" href="${yarnUrl(q.correct.word)}" target="_blank" rel="noopener">
          🎬 영상으로 보기
        </a>
        <button class="next-btn" onclick="nextQuestion()">
          ${state.currentQ + 1 >= state.questions.length ? 'See Results' : 'Next →'}
        </button>
      </div>
    `;
  }

  app.innerHTML = `
    <div style="width:100%">
      <div class="nav-row">
        <button class="nav-btn ${state.currentQ === 0 ? 'disabled' : ''}" onclick="prevQuestion()">← 이전 문제</button>
        <button class="nav-btn" onclick="goHome()">🏠 홈</button>
      </div>
      <div class="progress-row">
        <span class="qnum">Q${state.currentQ + 1} / ${state.questions.length}</span>
        <span class="score">✓ ${state.score}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${progress}%"></div>
      </div>
      <div class="card card-quiz" style="margin-top:24px">
        <div class="def-label">${promptLabel}</div>
        <div class="def-text">${promptText}</div>
        <div class="topic-tag">${q.correct.topic}</div>
      </div>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
    </div>
  `;
}

function renderResult(app) {
  const pct = Math.round((state.score / state.questions.length) * 100);
  const emoji = pct === 100 ? '🎉' : pct >= 80 ? '👏' : pct >= 60 ? '👍' : '💪';
  const grade = pct >= 80 ? 'good' : pct >= 60 ? 'mid' : 'bad';

  let wrongHTML = '';
  if (state.wrongList.length > 0) {
    wrongHTML = `
      <div style="margin-top:20px">
        <div class="wrong-title">✗ 틀린 문제 — 복습</div>
        <div class="wrong-list">
          ${state.wrongList.map(item => `
            <div class="wrong-item">
              <div class="word">${item.word}</div>
              <div class="def">${item.def}</div>
              <div class="ans">내 답: ${item.yourAnswer}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  let wrongOnlyBtn = '';
  if (state.wrongList.length > 0) {
    wrongOnlyBtn = `<button class="btn-wrong-only" onclick="retryWrongOnly()">틀린 것만</button>`;
  }

  app.innerHTML = `
    <div class="card" style="padding:40px 36px">
      <div style="text-align:center">
        <div style="font-size:52px;margin-bottom:8px">${emoji}</div>
        <h1>결과</h1>
        <div class="score-box ${grade}">
          <span class="score-num ${grade}">${state.score}/${state.questions.length}</span>
          <span class="score-pct">(${pct}%)</span>
        </div>
      </div>
      ${wrongHTML}
      <div class="btn-row">
        <button class="btn-menu" onclick="state.mode='menu';render()">메뉴</button>
        <button class="btn-retry" onclick="startQuiz()">다시 풀기</button>
        ${wrongOnlyBtn}
      </div>
    </div>
  `;
}

function retryWrongOnly() {
  const keys = new Set(state.wrongList.map(w => w.word + '|' + w.def));
  const pool = ALL_WORDS.filter(w => keys.has(w.word + '|' + w.def));
  state.questions = buildQuestions(pool, pool.length, state.direction);
  state.currentQ = 0;
  state.score = 0;
  state.wrongList = [];
  state.mode = "quiz";
  render();
}

render();
</script>
</body>
